{% extends 'base.html' %}

{% block title %}회원가입 | MatchVision{% endblock %}

{% block content %}
<div class="card">
    <h2>회원가입</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="button" type="submit">회원가입</button>
    </form>

    <hr>

    <p>이미 계정이 있으신가요?</p>
    <a href="{% url 'login' %}">로그인</a>
</div>
{% endblock %}
