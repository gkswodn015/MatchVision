{% extends 'base.html' %}

{% block title %}팀 수정 | Football Analyzer{% endblock %}

{% block content %}
<div class="card">
    <h2>팀 정보 수정</h2>
    <p>등록된 팀의 이름과 소속 리그를 수정합니다.</p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button class="button" type="submit">수정 저장</button>
        <a class="button" href="{% url 'team_player_manage' %}">취소</a>
    </form>
</div>
{% endblock %}
