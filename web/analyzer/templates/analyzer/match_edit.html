{% extends 'base.html' %}

{% block title %}경기 수정 | MatchVision{% endblock %}

{% block content %}
<div class="card">
    <h2>경기 정보 수정</h2>
    <p>업로드된 경기 영상의 제목을 수정합니다.</p>
</div>

<div class="card">
    <h3>현재 경기명: {{ match.title }}</h3>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button class="button" type="submit">수정 저장</button>
        <a class="button" href="{% url 'match_manage' %}">취소</a>
    </form>
</div>
{% endblock %}
