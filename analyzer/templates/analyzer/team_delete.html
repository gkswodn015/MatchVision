{% extends 'base.html' %}

{% block title %}팀 삭제 | Football Analyzer{% endblock %}

{% block content %}
<div class="card">
    <h2>팀 삭제</h2>
    <p>정말 아래 팀을 삭제하시겠습니까?</p>

    <p><strong>팀 이름:</strong> {{ team.name }}</p>
    <p><strong>소속 리그:</strong> {{ team.league }}</p>

    <form method="post">
        {% csrf_token %}
        <button class="button danger-button" type="submit">삭제</button>
        <a class="button" href="{% url 'team_player_manage' %}">취소</a>
    </form>
</div>
{% endblock %}
