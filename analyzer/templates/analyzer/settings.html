{% extends 'base.html' %}

{% block title %}설정 | Football Analyzer{% endblock %}

{% block content %}
<div class="card">
    <h2>설정</h2>
    <p>
        분석 리포트에서 표시할 항목을 설정합니다.
    </p>
</div>

<div class="card">
    <h3>리포트 표시 옵션</h3>

    <form method="post">
        {% csrf_token %}

        <p>
            <label>
                <input type="checkbox" name="show_tracking" {% if settings.show_tracking %}checked{% endif %}>
                선수 추적 정보 표시
            </label>
        </p>

        <p>
            <label>
                <input type="checkbox" name="show_path" {% if settings.show_path %}checked{% endif %}>
                선수 및 공 이동 경로 표시
            </label>
        </p>

        <p>
            <label>
                <input type="checkbox" name="show_topview" {% if settings.show_topview %}checked{% endif %}>
                탑뷰 분석 결과 표시
            </label>
        </p>

        <p>
            <label>
                <input type="checkbox" name="show_speed" {% if settings.show_speed %}checked{% endif %}>
                선수 이동 거리 및 평균 속도 표시
            </label>
        </p>

        <p>
            <label>
                <input type="checkbox" name="show_summary" {% if settings.show_summary %}checked{% endif %}>
                리포트 요약 내용 표시
            </label>
        </p>

        <button class="button" type="submit">설정 저장</button>
    </form>
</div>

<div class="card">
    <h3>현재 설정 안내</h3>
    <p>
        이 설정은 분석 리포트 페이지에서 표시되는 항목에 반영됩니다.
    </p>
    <p class="disabled">
        실제 YOLO/OpenCV 분석 옵션과의 연결은 추후 분석 알고리즘 연동 단계에서 확장할 수 있습니다.
    </p>
</div>
{% endblock %}
