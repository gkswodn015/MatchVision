{% extends 'base.html' %}

{% block title %}영상 업로드 | Football Analyzer{% endblock %}

{% block content %}
<div class="card">
    <h2>영상 업로드 페이지</h2>
    <p>분석할 축구 경기 영상을 업로드합니다.</p>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}

        <button class="button" type="submit">영상 업로드</button>
    </form>
</div>

<div class="card">
    <h3>업로드 안내</h3>
    <p>경기명과 영상 파일을 선택한 뒤 업로드 버튼을 누르세요.</p>
    <p>업로드된 영상은 이후 영상 분석 페이지와 경기 관리 페이지에서 확인할 수 있습니다.</p>
</div>
{% endblock %}
